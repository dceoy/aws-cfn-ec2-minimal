---
AWSTemplateFormatVersion: 2010-09-09
Description: >-
  CloudFormation template to launch a Windows Server EC2 instance.
  The instance is accessible via AWS Systems Manager Session Manager
  and uses a PowerShell UserData script for first-boot bootstrap.
  A custom UserData script can optionally be supplied at deploy time.
Parameters:
  SystemName:
    Description: System name used for resource naming and tagging
    Type: String
    Default: fte
  EnvType:
    Description: Environment type used for resource naming and tagging
    Type: String
    Default: dev
  Ec2VpcCidrBlock:
    Description: IPv4 CIDR block for the VPC
    Type: String
    Default: 10.0.0.0/16
    AllowedPattern: ^(\d{1,3}\.){3}\d{1,3}/\d{1,2}$
    ConstraintDescription: Must be a valid CIDR block (e.g. 10.0.0.0/16).
  Ec2SubnetCidrBlock:
    Description: IPv4 CIDR block for the public subnet
    Type: String
    Default: 10.0.0.0/24
    AllowedPattern: ^(\d{1,3}\.){3}\d{1,3}/\d{1,2}$
    ConstraintDescription: Must be a valid CIDR block (e.g. 10.0.0.0/24).
  Ec2InstanceType:
    Description: EC2 instance type
    Type: String
    Default: m7i-flex.large
    # AllowedValues:  # The following instance types are free tier eligible.
    #   - t4g.micro
    #   - t4g.small
    #   - t3.micro
    #   - t3.small
    #   - c7i-flex.large
    #   - m7i-flex.large
  Ec2WindowsAmiId:
    Description: >-
      SSM parameter path for the Windows Server AMI ID.
      Defaults to the latest Windows Server 2025 English Full Base AMI.
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-windows-latest/Windows_Server-2025-English-Full-Base
  Ec2VolumeSize:
    Description: Root EBS volume size in GiB
    Type: Number
    Default: 64
    MinValue: 16
    MaxValue: 1024
  Ec2VolumeType:
    Description: Root EBS volume type (io1/io2 are omitted; they require Iops)
    Type: String
    Default: gp3
    AllowedValues:
      - gp3
      - gp2
  Ec2UserData:
    Description: >-
      Optional EC2 UserData script to use instead of the default bootstrap.
      Leave empty to keep the built-in PowerShell bootstrap behavior.
    Type: String
    Default: ''
    NoEcho: true
Conditions:
  HasEc2UserData:
    Fn::Not:
      - Fn::Equals:
          - !Ref Ec2UserData
          - ''
Resources:
  # trivy:ignore:AWS-0178
  Ec2Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref Ec2VpcCidrBlock
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub "${SystemName}-${EnvType}-ec2-vpc"
        - Key: SystemName
          Value: !Ref SystemName
        - Key: EnvType
          Value: !Ref EnvType
  Ec2Ipv6CidrBlock:
    Type: AWS::EC2::VPCCidrBlock
    Properties:
      VpcId: !Ref Ec2Vpc
      AmazonProvidedIpv6CidrBlock: true
  Ec2Subnet:
    Type: AWS::EC2::Subnet
    DependsOn: Ec2Ipv6CidrBlock
    Properties:
      VpcId: !Ref Ec2Vpc
      CidrBlock: !Ref Ec2SubnetCidrBlock
      Ipv6CidrBlock: !Select
        - 0
        - !GetAtt Ec2Vpc.Ipv6CidrBlocks
      MapPublicIpOnLaunch: true  # trivy:ignore:AWS-0164
      Tags:
        - Key: Name
          Value: !Sub "${SystemName}-${EnvType}-ec2-subnet"
        - Key: SystemName
          Value: !Ref SystemName
        - Key: EnvType
          Value: !Ref EnvType
  Ec2InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub "${SystemName}-${EnvType}-ec2-igw"
        - Key: SystemName
          Value: !Ref SystemName
        - Key: EnvType
          Value: !Ref EnvType
  Ec2VpcGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref Ec2Vpc
      InternetGatewayId: !Ref Ec2InternetGateway
  Ec2EgressOnlyInternetGateway:
    Type: AWS::EC2::EgressOnlyInternetGateway
    Properties:
      VpcId: !Ref Ec2Vpc
  Ec2RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Ec2Vpc
      Tags:
        - Key: Name
          Value: !Sub "${SystemName}-${EnvType}-ec2-rtb"
        - Key: SystemName
          Value: !Ref SystemName
        - Key: EnvType
          Value: !Ref EnvType
  Ec2RouteIpv4Default:
    Type: AWS::EC2::Route
    DependsOn: Ec2VpcGatewayAttachment
    Properties:
      RouteTableId: !Ref Ec2RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref Ec2InternetGateway
  Ec2RouteIpv6Default:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref Ec2RouteTable
      DestinationIpv6CidrBlock: ::/0
      EgressOnlyInternetGatewayId: !Ref Ec2EgressOnlyInternetGateway
  Ec2SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref Ec2Subnet
      RouteTableId: !Ref Ec2RouteTable
  Ec2NetworkAcl:
    Type: AWS::EC2::NetworkAcl
    Properties:
      VpcId: !Ref Ec2Vpc
      Tags:
        - Key: Name
          Value: !Sub "${SystemName}-${EnvType}-ec2-nacl"
        - Key: SystemName
          Value: !Ref SystemName
        - Key: EnvType
          Value: !Ref EnvType
  Ec2NetworkAclEntryInboundDenySsh:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref Ec2NetworkAcl
      RuleNumber: 100
      Protocol: 6
      RuleAction: deny
      Egress: false
      CidrBlock: 0.0.0.0/0
      PortRange:
        From: 22
        To: 22
  Ec2NetworkAclEntryInboundDenySshIpv6:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref Ec2NetworkAcl
      RuleNumber: 110
      Protocol: 6
      RuleAction: deny
      Egress: false
      Ipv6CidrBlock: ::/0
      PortRange:
        From: 22
        To: 22
  Ec2NetworkAclEntryInboundDenyRdp:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref Ec2NetworkAcl
      RuleNumber: 120
      Protocol: 6
      RuleAction: deny
      Egress: false
      CidrBlock: 0.0.0.0/0
      PortRange:
        From: 3389
        To: 3389
  Ec2NetworkAclEntryInboundDenyRdpIpv6:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref Ec2NetworkAcl
      RuleNumber: 130
      Protocol: 6
      RuleAction: deny
      Egress: false
      Ipv6CidrBlock: ::/0
      PortRange:
        From: 3389
        To: 3389
  Ec2NetworkAclEntryInboundAllowAll:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref Ec2NetworkAcl
      RuleNumber: 900
      Protocol: -1  # trivy:ignore:AWS-0102
      RuleAction: allow
      Egress: false
      CidrBlock: 0.0.0.0/0  # trivy:ignore:AWS-0105
  Ec2NetworkAclEntryInboundAllowAllIpv6:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref Ec2NetworkAcl
      RuleNumber: 901
      Protocol: -1  # trivy:ignore:AWS-0102
      RuleAction: allow
      Egress: false
      Ipv6CidrBlock: ::/0  # trivy:ignore:AWS-0105
  Ec2NetworkAclEntryOutboundAllowAll:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref Ec2NetworkAcl
      RuleNumber: 900
      Protocol: -1  # trivy:ignore:AWS-0102
      RuleAction: allow
      Egress: true
      CidrBlock: 0.0.0.0/0
  Ec2NetworkAclEntryOutboundAllowAllIpv6:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref Ec2NetworkAcl
      RuleNumber: 901
      Protocol: -1  # trivy:ignore:AWS-0102
      RuleAction: allow
      Egress: true
      Ipv6CidrBlock: ::/0
  Ec2SubnetNetworkAclAssociation:
    Type: AWS::EC2::SubnetNetworkAclAssociation
    Properties:
      SubnetId: !Ref Ec2Subnet
      NetworkAclId: !Ref Ec2NetworkAcl
  Ec2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub "${SystemName}-${EnvType}-ec2-sg"
      GroupDescription: !Sub "${SystemName}-${EnvType} - EC2 instance security group"
      VpcId: !Ref Ec2Vpc
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0  # trivy:ignore:AWS-0104
          Description: Allow outbound HTTPS (IPv4)
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIpv6: ::/0  # trivy:ignore:AWS-0104
          Description: Allow outbound HTTPS (IPv6)
      Tags:
        - Key: Name
          Value: !Sub "${SystemName}-${EnvType}-ec2-sg"
        - Key: SystemName
          Value: !Ref SystemName
        - Key: EnvType
          Value: !Ref EnvType
  IamRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${SystemName}-${EnvType}-iam-role"
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Tags:
        - Key: Name
          Value: !Sub "${SystemName}-${EnvType}-iam-role"
        - Key: SystemName
          Value: !Ref SystemName
        - Key: EnvType
          Value: !Ref EnvType
  IamInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub "${SystemName}-${EnvType}-iam-instance-profile"
      Roles:
        - !Ref IamRole
  # trivy:ignore:AWS-0028
  Ec2Instance:
    Type: AWS::EC2::Instance
    DependsOn: Ec2RouteIpv4Default
    Metadata:
      checkov:
        skip:
          - id: CKV_AWS_88
            comment: >-
              Public IP is required for internet access during the default UserData bootstrap.
              Inbound access is blocked by the security group (no ingress rules).
    Properties:
      ImageId: !Ref Ec2WindowsAmiId
      InstanceType: !Ref Ec2InstanceType
      IamInstanceProfile: !Ref IamInstanceProfile
      MetadataOptions:
        HttpTokens: required
        HttpEndpoint: enabled
      NetworkInterfaces:
        - DeviceIndex: 0
          SubnetId: !Ref Ec2Subnet
          AssociatePublicIpAddress: true
          GroupSet:
            - !Ref Ec2SecurityGroup
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            VolumeSize: !Ref Ec2VolumeSize
            VolumeType: !Ref Ec2VolumeType
            Encrypted: true
            DeleteOnTermination: true
      UserData:
        Fn::Base64:
          Fn::If:
            - HasEc2UserData
            - !Ref Ec2UserData
            - !Sub |
                <powershell>
                $ErrorActionPreference = "Continue"

                # --- Disable OpenSSH Server ---
                $sshdSvc = Get-Service -Name sshd -ErrorAction SilentlyContinue
                if ($sshdSvc) {
                  Stop-Service sshd -Force -ErrorAction SilentlyContinue
                  Set-Service sshd -StartupType Disabled
                }

                # --- Install winget (Windows Package Manager) ---
                $wingetBundle = "$env:TEMP\Microsoft.DesktopAppInstaller.msixbundle"
                $wingetLicense = "$env:TEMP\License1.xml"
                $dependenciesDir = "$env:TEMP\winget-deps"
                New-Item -ItemType Directory -Path $dependenciesDir -Force | Out-Null

                # Fetch the latest winget release from GitHub
                [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
                $wingetApiUrl = "https://api.github.com/repos/microsoft/winget-cli/releases/latest"
                $releaseInfo = Invoke-RestMethod -Uri $wingetApiUrl -UseBasicParsing
                $msixUrl = ($releaseInfo.assets | Where-Object { $_.name -match '\.msixbundle$' }).browser_download_url
                $licenseUrl = ($releaseInfo.assets | Where-Object { $_.name -match 'License.*\.xml$' }).browser_download_url

                Invoke-WebRequest -Uri $msixUrl -OutFile $wingetBundle -UseBasicParsing
                Invoke-WebRequest -Uri $licenseUrl -OutFile $wingetLicense -UseBasicParsing

                # Download dependencies (VCLibs and Microsoft.UI.Xaml)
                Invoke-WebRequest -Uri "https://aka.ms/Microsoft.VCLibs.x64.14.00.Desktop.appx" `
                  -OutFile "$dependenciesDir\VCLibs.appx" -UseBasicParsing
                $uiXamlApiUrl = "https://api.github.com/repos/microsoft/microsoft-ui-xaml/releases?per_page=50"
                $uiXamlRelease = Invoke-RestMethod -Uri $uiXamlApiUrl -UseBasicParsing
                $uiXaml2x = $uiXamlRelease | Where-Object { $_.tag_name -match '^v2\.' } | Select-Object -First 1
                $uiXamlUrl = ($uiXaml2x.assets | Where-Object { $_.name -match 'x64.*\.appx$' }).browser_download_url
                Invoke-WebRequest -Uri $uiXamlUrl -OutFile "$dependenciesDir\UIXaml.appx" -UseBasicParsing

                # Install winget with dependencies
                Add-AppxProvisionedPackage -Online `
                  -PackagePath $wingetBundle `
                  -LicensePath $wingetLicense `
                  -DependencyPackagePath "$dependenciesDir\VCLibs.appx","$dependenciesDir\UIXaml.appx"

                # Add winget to the PATH for the current session
                $wingetFilter = "Microsoft.DesktopAppInstaller_*_x64__8wekyb3d8bbwe"
                $wingetAppsDir = "$env:ProgramFiles\WindowsApps"
                $wingetDir = (Get-ChildItem -Path $wingetAppsDir -Filter $wingetFilter -Directory |
                  Sort-Object Name -Descending | Select-Object -First 1).FullName
                if ($wingetDir) {
                  $env:Path += ";$wingetDir"
                }

                # Clean up winget installer files
                Remove-Item -Path $wingetBundle, $wingetLicense -Force -ErrorAction SilentlyContinue
                Remove-Item -Path $dependenciesDir -Recurse -Force -ErrorAction SilentlyContinue

                # --- Install packages with winget ---
                $packages = @(
                  "Microsoft.WindowsTerminal",
                  "Microsoft.PowerShell",
                  "vim.vim",
                  "Microsoft.VisualStudioCode",
                  "Microsoft.VisualStudioCode.CLI",
                  "Microsoft.PowerToys",
                  "Git.Git",
                  "astral-sh.uv",
                  "Google.Chrome",
                  "Google.ChromeRemoteDesktop",
                  "Tailscale.Tailscale",
                  "Amazon.AWSCLI",
                  "Dropbox.Dropbox"
                )
                $userDataExitCode = 0
                foreach ($pkg in $packages) {
                  winget install --id $pkg --exact --silent --accept-package-agreements --accept-source-agreements
                  if ($LASTEXITCODE -ne 0) {
                    $userDataExitCode = $LASTEXITCODE
                    break
                  }
                }

                # Signal CloudFormation
                cfn-signal.exe --exit-code $userDataExitCode `
                  --stack ${AWS::StackName} --resource Ec2Instance `
                  --region ${AWS::Region}
                </powershell>
      Tags:
        - Key: Name
          Value: !Sub "${SystemName}-${EnvType}-ec2-instance"
        - Key: SystemName
          Value: !Ref SystemName
        - Key: EnvType
          Value: !Ref EnvType
    CreationPolicy:
      ResourceSignal:
        Timeout: PT30M
Outputs:
  Ec2VpcId:
    Description: VPC ID
    Value: !Ref Ec2Vpc
  Ec2SubnetId:
    Description: Subnet ID
    Value: !Ref Ec2Subnet
  Ec2InstanceId:
    Description: EC2 instance ID
    Value: !Ref Ec2Instance
  Ec2PrivateIp:
    Description: Private IP address of the instance
    Value: !GetAtt Ec2Instance.PrivateIp
  Ec2PublicIp:
    Description: Public IP address of the instance
    Value: !GetAtt Ec2Instance.PublicIp
  Ec2SecurityGroupId:
    Description: Security group ID
    Value: !Ref Ec2SecurityGroup
  Ec2InternetGatewayId:
    Description: Internet gateway ID
    Value: !Ref Ec2InternetGateway
  Ec2EgressOnlyInternetGatewayId:
    Description: Egress-only internet gateway ID
    Value: !Ref Ec2EgressOnlyInternetGateway
